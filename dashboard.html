<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>애니메이션 제작 대시보드</title>
<style>
  :root {
    --bg:#0f1117; --surface:#1a1d27; --surface2:#22253a; --border:#2e3150;
    --accent:#6c63ff; --green:#43d98a; --yellow:#ffd166; --orange:#ff9f43;
    --text:#e8eaf6; --text2:#8b90b8;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;font-size:13px;}

  /* ── Header ── */
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;height:53px;}
  header h1{font-size:17px;font-weight:700;white-space:nowrap;flex-shrink:0;}
  header h1 .t-pre{color:var(--accent);}
  header h1 .t-post{color:var(--text2);}
  .header-tabs{display:flex;gap:2px;align-items:center;margin-left:20px;}
  .header-tab{padding:6px 16px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text2);transition:all .15s;white-space:nowrap;}
  .header-tab:hover{background:var(--surface2);color:var(--text);}
  .header-tab.active{background:var(--accent);color:#fff;}
  .header-btns{display:flex;gap:8px;flex-shrink:0;margin-left:auto;}
  .hbtn{padding:6px 14px;border-radius:7px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .15s;}
  .hbtn:hover{opacity:.85;}
  .hbtn-primary{background:var(--accent);color:#fff;}
  .hbtn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}

  /* ── Layout ── */
  .layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 53px);}

  /* ── Sidebar ── */
  .sidebar{background:var(--surface);border-right:1px solid var(--border);padding:14px 10px;overflow-y:auto;}
  .sb-section{margin-bottom:22px;}
  .sb-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:6px;padding:0 4px;}
  .wcard{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:8px;cursor:pointer;transition:background .15s;margin-bottom:2px;}
  .wcard:hover,.wcard.active{background:var(--surface2);}
  .wdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .wname{font-weight:600;font-size:13px;}
  .wrole{display:inline-block;font-size:9px;padding:1px 5px;border-radius:8px;margin-left:3px;font-weight:600;background:var(--surface2);color:var(--text2);}
  .wrole-sup{background:#3a2600;color:var(--orange);border:1px solid #5a3c00;}
  .wsub{font-size:11px;color:var(--text2);margin-top:1px;}
  .wbadge{margin-left:auto;font-size:10px;background:var(--surface2);padding:2px 6px;border-radius:10px;color:var(--text2);flex-shrink:0;}
  .sup-divider{height:1px;background:var(--border);margin:6px 4px;}
  .legend{display:flex;flex-direction:column;gap:5px;padding:0 4px;}
  .leg{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text2);}
  .legdot{width:8px;height:8px;border-radius:3px;flex-shrink:0;}

  /* ── Main ── */
  .main{padding:18px 22px;overflow-x:hidden;display:flex;flex-direction:column;}
  .tabs{display:flex;gap:4px;margin-bottom:16px;}
  .tab{padding:7px 18px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text2);transition:all .15s;}
  .tab:hover{background:var(--surface2);color:var(--text);}
  .tab.active{background:var(--accent);color:#fff;}

  /* ── Summary ── */
  .summary-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
  .scard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 16px;flex:1;min-width:110px;}
  .sval{font-size:22px;font-weight:700;color:var(--accent);}
  .slabel{font-size:11px;color:var(--text2);margin-top:1px;}

  /* ── Filter pills (works view) ── */
  .filter-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
  .fpill{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;}
  .fpill:hover{border-color:var(--accent);color:var(--text);}
  .fpill.active{background:var(--accent);border-color:var(--accent);color:#fff;}

  /* ── Works grid ── */
  .works-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(390px,1fr));gap:14px;}
  .wk-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
  .wk-header{padding:13px 15px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
  .wk-title{font-size:15px;font-weight:700;}
  .wk-meta{font-size:11px;color:var(--text2);margin-top:2px;}
  .phase-badge{font-size:10px;padding:3px 10px;border-radius:20px;font-weight:600;white-space:nowrap;background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
  .pre-phases{display:flex;padding:11px 15px;border-bottom:1px solid var(--border);}
  .phase-step{flex:1;text-align:center;position:relative;}
  .phase-step:not(:last-child)::after{content:'→';position:absolute;right:-8px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:11px;}
  .pdot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 3px;font-size:11px;font-weight:700;}
  .pdot.done{background:var(--green);color:#000;}
  .pdot.active{background:var(--yellow);color:#000;}
  .pdot.pending{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
  .plabel{font-size:10px;color:var(--text2);line-height:1.3;}
  .ep-table{width:100%;border-collapse:collapse;}
  .ep-table th{background:var(--surface2);padding:6px 10px;text-align:left;font-size:10px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
  .ep-table td{padding:6px 10px;border-top:1px solid var(--border);font-size:12px;}
  .ep-table tr:hover td{background:var(--surface2);}
  .ep-table tr.this-week td{background:rgba(108,99,255,.1);}
  .ep-table tr.this-week td:first-child{border-left:3px solid var(--accent);}
  .estage{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;}
  .s0{background:#2d2f4a;color:var(--text2);}
  .s1{background:#2a2e3a;color:#a0a0c0;}
  .s2{background:#1a3a5c;color:#7ec8e3;}
  .s3{background:#3a2e1a;color:#ffd166;}
  .s4{background:#3a1a2e;color:#ff9fb5;}
  .s5{background:#2e1a3a;color:#c084fc;}
  .s6{background:#1a3a2e;color:#43d98a;}
  .confirm-needed{background:#3a2600;color:var(--orange);border:1px solid #5a3c00;}
  .ack-badge{font-size:9px;}
  .ack-confirm{background:#1a3a2e;color:#43d98a;border:1px solid #2e6845;}
  .ack-adapt{background:#1a3a5c;color:#7ec8e3;border:1px solid #2e5a78;}
  .prog-wrap{display:flex;align-items:center;gap:5px;}
  .prog-bar{flex:1;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;min-width:50px;}
  .prog-fill{height:100%;border-radius:3px;}
  .prog-txt{font-size:10px;color:var(--text2);width:28px;text-align:right;flex-shrink:0;}

  /* ── Weekly timeline (day-based) ── */
  /* ── 관리자용 보드 ── */
  .ab-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;margin-bottom:16px;}
  .ab-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;}
  .ab-card-title{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-bottom:12px;}
  .ab-stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px 18px;}
  .ab-stat{display:flex;flex-direction:column;}
  .ab-stat-val{font-size:28px;font-weight:700;color:var(--accent);line-height:1;}
  .ab-stat-lbl{font-size:11px;color:var(--text2);margin-top:4px;font-weight:600;}
  .ab-stat-val.green{color:var(--green);}
  .ab-stat-val.yellow{color:var(--yellow);}
  .ab-stat-val.gray{color:var(--text2);}
  .ab-stat-val.orange{color:var(--orange);}
  .ab-prog-wrap{margin-top:6px;}
  .ab-prog-bar{height:10px;background:var(--surface2);border-radius:6px;overflow:hidden;margin:8px 0;}
  .ab-prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));}
  .ab-prog-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);}
  .ab-prog-pct{font-size:34px;font-weight:800;color:var(--accent);line-height:1;margin-bottom:4px;}
  .ab-list{display:flex;flex-direction:column;gap:8px;}
  .ab-delay-row{display:grid;grid-template-columns:1fr auto auto;gap:14px;align-items:center;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--orange);border-radius:8px;padding:9px 14px;cursor:pointer;}
  .ab-delay-row.overdue{border-left-color:#ff6584;background:#22171c;}
  .ab-delay-row:hover{background:var(--surface2);}
  .ab-delay-row.overdue:hover{background:#2c1d24;}
  .ab-delay-title{font-size:13px;font-weight:600;}
  .ab-delay-ep{color:var(--text2);font-weight:500;font-size:11px;margin-left:6px;}
  .ab-delay-dates{font-size:11px;color:var(--text2);}
  .ab-delay-days{font-size:13px;font-weight:700;color:var(--orange);background:#3a2600;padding:3px 10px;border-radius:14px;white-space:nowrap;}
  .ab-delay-days.overdue{color:#ff6584;background:#3a1a26;border:1px solid #5a2a3c;}
  .ab-empty{padding:20px;text-align:center;color:var(--text2);font-size:12px;background:var(--surface);border:1px dashed var(--border);border-radius:10px;}
  .ab-section-title{font-size:13px;font-weight:700;margin:22px 0 10px;}
  .ab-stat-clickable{cursor:pointer;border-radius:8px;padding:6px 8px;margin:-6px -8px;transition:background .15s;}
  .ab-stat-clickable:hover{background:var(--surface2);}
  .ab-tw{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .ab-tw-row{display:grid;align-items:center;border-bottom:1px solid var(--border);}
  .ab-tw-row:last-child{border-bottom:none;}
  .ab-tw-row{grid-template-columns:repeat(calc(var(--ab-cols, 5) - 1), 1fr) 36px;}
  .ab-tw-head{background:var(--surface2);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);}
  .ab-tw-cell{padding:10px 14px;font-size:12px;}
  .ab-tw-title{padding:10px 14px;font-size:13px;font-weight:600;}
  .ab-del-btn{background:none;border:none;color:var(--text2);cursor:pointer;font-size:14px;padding:4px 6px;border-radius:4px;opacity:0.4;transition:opacity .15s,color .15s;}
  .ab-tw-row:hover .ab-del-btn{opacity:1;}
  .ab-del-btn:hover{color:#ff6584;}
  /* ── 작업자별 작업일 분석 ── */
  .ws-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;}
  .ws-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .ws-header{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:var(--surface2);border-bottom:1px solid var(--border);}
  .ws-name{font-size:13px;font-weight:700;}
  .ws-subrole{font-size:10px;color:var(--text2);margin-left:5px;}
  .ws-avg-lbl{font-size:10px;color:var(--text2);margin-right:3px;}
  .ws-avg-val{font-size:16px;font-weight:700;color:var(--text);}
  .ws-work-group{padding:6px 14px 4px;border-bottom:1px solid var(--border);}
  .ws-work-group:last-child{border-bottom:none;padding-bottom:8px;}
  .ws-work-title{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;}
  .ws-ep-row{display:grid;grid-template-columns:36px 52px 72px 1fr;align-items:center;gap:4px;padding:3px 0;font-size:12px;}
  .ws-ep-num{font-weight:600;color:var(--text);}
  .ws-ep-actual{font-weight:700;}
  .ws-ep-planned{color:var(--text2);font-size:11px;}
  .ws-ep-badge{font-size:10px;padding:1px 7px;border-radius:10px;text-align:center;white-space:nowrap;justify-self:start;}
  .ws-faster .ws-ep-actual{color:var(--green);}
  .ws-faster .ws-ep-badge{color:var(--green);background:#1a3a2a;}
  .ws-slower .ws-ep-actual{color:#ff6584;}
  .ws-slower .ws-ep-badge{color:#ff6584;background:#3a1a26;}
  .ws-same .ws-ep-badge{color:var(--text2);background:var(--surface2);}

  /* ── Timeline (캘린더 + 간트 막대) ── */
  .tl-scroll{overflow:auto;max-height:calc(100vh - 195px);}
  .tl-wrap{position:relative;display:flex;flex-direction:column;}
  .tl-row{display:flex;align-items:stretch;border-bottom:1px solid var(--border);}
  .tl-row-head{position:sticky;top:0;z-index:5;background:var(--bg);border-bottom:1px solid var(--border);}
  .tl-side{position:sticky;left:0;z-index:3;width:160px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:8px 12px;display:flex;flex-direction:column;justify-content:center;}
  .tl-row-head .tl-side{background:var(--bg);}
  .tl-row-label{font-weight:600;font-size:12px;}
  .tl-row-sub{font-size:10px;color:var(--text2);margin-top:2px;}
  .tl-track{position:relative;flex-shrink:0;background:var(--surface);}
  .tl-track-head{height:42px;background:var(--bg);}
  .tl-week-hd{position:absolute;top:0;height:21px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--text2);border-left:1px solid var(--border);}
  .tl-week-hd.cur{color:var(--accent);background:rgba(108,99,255,.08);}
  .tl-day-hd{position:absolute;top:21px;height:21px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text2);}
  .tl-day-hd.cur-day{color:var(--accent);font-weight:700;}
  .tl-bg-cell{position:absolute;top:0;bottom:0;border-left:1px dotted rgba(255,255,255,.07);}
  .tl-bg-cell.week-start{border-left:1px solid var(--border);}
  .tl-bg-cell.cur-day{background:rgba(108,99,255,.06);}
  .tl-today{position:absolute;top:0;bottom:0;width:2px;background:var(--accent);z-index:1;pointer-events:none;opacity:.6;}
  .tl-bar{position:absolute;border-radius:6px;padding:5px 8px;cursor:pointer;overflow:hidden;z-index:2;color:#fff;display:flex;flex-direction:column;justify-content:center;}
  .tl-bar:hover{filter:brightness(1.2);}
  .tl-bar-ep{font-size:11px;font-weight:700;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tl-bar-stage{font-size:9px;line-height:1.1;margin-top:2px;opacity:.92;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tl-bar-prog{position:absolute;bottom:0;left:0;height:3px;background:rgba(255,255,255,.7);}
  .tl-bar.is-confirm{outline:1.5px solid var(--orange);outline-offset:-1px;}
  .tl-confirm-bar{position:absolute;background:#3a2600;border:1px solid var(--orange);color:var(--orange);border-radius:5px;padding:3px 8px;font-size:10px;font-weight:600;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;z-index:2;display:flex;align-items:center;}
  .tl-confirm-bar:hover{filter:brightness(1.15);}
  .tl-adapt-bar{position:absolute;background:#1a3a5c;border:1px solid #7ec8e3;color:#7ec8e3;border-radius:5px;padding:3px 8px;font-size:10px;font-weight:600;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;z-index:2;display:flex;align-items:center;}
  .tl-adapt-bar:hover{filter:brightness(1.15);}
  .tl-section-row{display:flex;background:var(--surface2);border-bottom:1px solid var(--border);}
  .tl-section-label{position:sticky;left:0;width:160px;flex-shrink:0;padding:6px 12px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text2);background:var(--surface2);border-right:1px solid var(--border);z-index:3;}
  .tl-section-fill{flex-shrink:0;background:var(--surface2);}

  /* ── Modal ── */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;}
  .modal-hd{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .modal-title{font-size:15px;font-weight:700;}
  .modal-x{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;}
  .modal-body{padding:18px 20px;}
  .fg{margin-bottom:14px;}
  .fl{font-size:11px;color:var(--text2);margin-bottom:4px;display:block;font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
  .fi,.fs{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-size:13px;outline:none;}
  .fi:focus,.fs:focus{border-color:var(--accent);}
  .frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .stage-sel{display:flex;flex-wrap:wrap;gap:5px;}
  .stbtn{padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:11px;cursor:pointer;transition:all .15s;}
  .stbtn.sel{border-color:var(--accent);color:var(--accent);background:rgba(108,99,255,.15);}
  .prog-inp{display:flex;align-items:center;gap:10px;}
  .prog-slider{flex:1;accent-color:var(--accent);}
  .prog-n{font-size:13px;font-weight:700;color:var(--accent);min-width:34px;}
  .btn{padding:8px 18px;border-radius:7px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s;}
  .btn:hover{opacity:.85;}
  .btn-p{background:var(--accent);color:#fff;}
  .btn-s{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
  .btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}

  /* 컨펌 필요 간단 카드 (감독 뷰) */
  .cf-section{margin-bottom:18px;}
  .cf-section-title{font-size:12px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:.6px;margin-bottom:9px;}
  .cf-section-title .cf-count{display:inline-block;background:#5a3c00;color:var(--orange);padding:1px 8px;border-radius:10px;margin-left:4px;font-size:11px;}
  .cf-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(390px,1fr));gap:14px;}
  .cf-card{display:grid;grid-template-columns:1fr auto auto auto;gap:14px;align-items:center;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--orange);border-radius:10px;padding:11px 14px;cursor:pointer;transition:background .15s;}
  .cf-card-adapt{border-left-color:#7ec8e3;}
  .cf-adapt-title{color:#7ec8e3 !important;}
  .cf-count-adapt{background:#1a3a5c !important;color:#7ec8e3 !important;}
  .cf-done-btn{padding:5px 12px;border:1px solid var(--orange);background:#3a2600;color:var(--orange);border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s;}
  .cf-done-btn:hover{background:var(--orange);color:#000;}
  .cf-done-btn-adapt{border-color:#7ec8e3;background:#1a3a5c;color:#7ec8e3;}
  .cf-done-btn-adapt:hover{background:#7ec8e3;color:#000;}
  .cf-card:hover{background:var(--surface2);}
  .cf-info{min-width:0;}
  .cf-title{font-size:13px;font-weight:700;color:var(--text);}
  .cf-title .cf-ep{color:var(--text2);font-weight:500;font-size:11px;margin-left:4px;}
  .cf-worker{font-size:11px;margin-top:2px;font-weight:600;color:var(--text2);}
  .cf-sched{font-size:12px;color:var(--text2);font-weight:600;white-space:nowrap;}

  /* 일정 캘린더 (시작일~종료일) */
  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .cal-arrow{background:none;border:none;color:var(--text2);width:26px;height:26px;cursor:pointer;font-size:18px;line-height:1;}
  .cal-arrow:hover{color:var(--accent);}
  .cal-mlbl{font-size:13px;font-weight:600;}
  .cal-dow{display:grid;grid-template-columns:repeat(5,1fr);}
  .cal-dow div{text-align:center;font-size:10px;color:var(--text2);padding:4px 0;}

<script>
// ── 상수 ────────────────────────────────────────────────────
const STAGES       = ['미시작','각색 완료','영상 추출 중','영상초안작업','피드백 수정중','마무리 작업중','완료'];
const STAGE_CLS    = ['s0','s1','s2','s3','s4','s5','s6'];
const STAGE_COLORS = ['#555','#a0a0c0','#7ec8e3','#ffd166','#ff9fb5','#c084fc','#43d98a'];
const PROG_STAGES  = [3, 4, 5]; // 영상초안작업, 피드백 수정중, 마무리 작업중 (진행률 표시)
const CONFIRM_STAGES = [3, 4, 5]; // 이 단계에서 progress===100이면 컨펌 필요
const STAGE_FEEDBACK = 4; // 피드백 수정중 — 다음 회차 각색 알림 트리거 기준
const PRE_PHASES   = ['작품 선정','아트스타일 픽스','주요 인물 디자인','연재 진행 중'];
const PRE_COLORS   = ['#6c63ff','#ff6584','#43d98a','#888'];

// 주간 계산
const WEEK_ORIGIN  = new Date(2026, 4, 4); // 2026-05-04 월요일
const TOTAL_WEEKS  = 35;
const MONTH_FIRST_WEEK = {5:0, 6:4, 7:9, 8:13, 9:18, 10:22, 11:26, 12:31};

function weekLabel(idx) {
  const d = new Date(WEEK_ORIGIN);
  d.setDate(d.getDate() + idx * 7);
  return `${d.getMonth()+1}/${d.getDate()}`;
}
function curWeekIdx() {
  const diff = Math.floor((new Date() - WEEK_ORIGIN) / (7*24*60*60*1000));
  return Math.max(0, Math.min(TOTAL_WEEKS-1, diff));
}

// ── 날짜 헬퍼 ────────────────────────────────────────────────
function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function parseDate(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function fmtRange(start, end) {
  if (!start) return '–';
  const s = parseDate(start);
  if (!end || start === end) return `${s.getMonth()+1}/${s.getDate()}`;
  const e = parseDate(end);
  return `${s.getMonth()+1}/${s.getDate()}~${e.getMonth()+1}/${e.getDate()}`;
}
function epWeekIdx(ep) {
  if (!ep.startDate) return 0;
  const diff = Math.floor((parseDate(ep.startDate) - WEEK_ORIGIN) / (7*24*60*60*1000));
  return Math.max(0, Math.min(TOTAL_WEEKS-1, diff));
}
function epEndWeekIdx(ep) {
  if (!ep.endDate) return epWeekIdx(ep);
  const diff = Math.floor((parseDate(ep.endDate) - WEEK_ORIGIN) / (7*24*60*60*1000));
  return Math.max(0, Math.min(TOTAL_WEEKS-1, diff));
}
function isCurrentEp(ep) {
  if (!ep.startDate || !ep.endDate) return false;
  const today = fmtDate(new Date());
  return today >= ep.startDate && today <= ep.endDate;
}
// 영업일(월~금) 더하기 — 주말 건너뜀
function addBusinessDays(dateStr, n) {
  if (!n) return dateStr;
  const d = parseDate(dateStr);
  const dir = n > 0 ? 1 : -1;
  let remaining = Math.abs(n);
  while (remaining > 0) {
    d.setDate(d.getDate() + dir);
    const dow = d.getDay();
    if (dow !== 0 && dow !== 6) remaining--;
  }
  return fmtDate(d);
}
// 두 날짜 사이의 영업일 수 (부호 포함)
function businessDaysBetween(fromStr, toStr) {
  if (fromStr === toStr) return 0;
  const from = parseDate(fromStr), to = parseDate(toStr);
  const dir = from < to ? 1 : -1;
  const d = new Date(from);
  let count = 0;
  while ((dir > 0 && d < to) || (dir < 0 && d > to)) {
    d.setDate(d.getDate() + dir);
    const dow = d.getDay();
    if (dow !== 0 && dow !== 6) count += dir;
  }
  return count;
}
function dateToCol(dateStr) {
  const d = parseDate(dateStr);
  const diffDays = Math.floor((d - WEEK_ORIGIN) / 86400000);
  if (diffDays < 0) return 0;
  const dow = d.getDay();
  const dayIdx = dow === 0 ? 4 : Math.min(Math.max(dow - 1, 0), 4);
  const wkIdx  = Math.floor((diffDays - dayIdx) / 7);
  return Math.max(0, Math.min(TOTAL_WEEKS*5 - 1, wkIdx * 5 + dayIdx));
}
// 시간 범위가 겹치지 않게 차곡차곡 레인 분배
function assignLanes(items) {
  const sorted = [...items].sort((a,b) => a.startDate.localeCompare(b.startDate));
  const lanes  = []; // 각 lane = 마지막 item.endDate
  sorted.forEach(item => {
    let placed = false;
    for (let i = 0; i < lanes.length; i++) {
      if (lanes[i] < item.startDate) {
        item._lane = i;
        lanes[i] = item.endDate;
        placed = true;
        break;
      }
    }
    if (!placed) {
      item._lane = lanes.length;
      lanes.push(item.endDate);
    }
  });
  return { items: sorted, laneCount: Math.max(1, lanes.length) };
}

// 회차당 기본 영업일 (월~금만 카운트, 토·일 제외)
const EP_BUSINESS_DAYS = 5;

function makeEps(total, startMonth) {
  const baseWk = MONTH_FIRST_WEEK[startMonth] ?? 0;
  let cursor = new Date(WEEK_ORIGIN);
  cursor.setDate(cursor.getDate() + baseWk * 7); // 시작 월요일

  const eps = [];
  for (let i = 0; i < total; i++) {
    const startStr = fmtDate(cursor);
    const endStr   = addBusinessDays(startStr, EP_BUSINESS_DAYS - 1); // 기본 영업일 (시작일 포함)
    eps.push({
      ep: i + 1,
      startDate: startStr, endDate: endStr,
      originalStartDate: startStr, originalEndDate: endStr,
      stage: 0, progress: 0, memo: '',
    });
    cursor = parseDate(addBusinessDays(endStr, 1)); // 다음 회차는 다음 영업일부터
  }
  return eps;
}

// ── DB ↔ state 매핑 ─────────────────────────────────────────
async function loadAll() {
  const [workersRes, worksRes, episodesRes] = await Promise.all([
    supabase.from('workers').select('*').order('is_sup',{ascending:false}).order('sort_order'),
    supabase.from('works').select('*').order('id'),
    supabase.from('episodes').select('*').order('work_id').order('ep_num'),
  ]);
  if (workersRes.error)  console.error('workers',  workersRes.error);
  if (worksRes.error)    console.error('works',    worksRes.error);
  if (episodesRes.error) console.error('episodes', episodesRes.error);

  state.workers = (workersRes.data || []).map(w => ({
    id: w.id, name: w.name, color: w.color, isSup: w.is_sup,
    subrole: w.subrole || '', sortOrder: w.sort_order,
  }));

  const epsByWork = {};
  (episodesRes.data || []).forEach(e => {
    (epsByWork[e.work_id] = epsByWork[e.work_id] || []).push({
      ep: e.ep_num,
      startDate: e.start_date, endDate: e.end_date,
      originalStartDate: e.original_start_date,
      originalEndDate:   e.original_end_date,
      stage: e.stage, progress: e.progress, memo: e.memo || '',
      ack: e.ack_kind ? { kind: e.ack_kind, label: e.ack_label } : null,
    });
  });

  state.works = (worksRes.data || []).map(w => ({
    id: w.id, title: w.title,
    worker: w.worker || '',
    startMonth: w.start_month, totalEp: w.total_ep, prePhase: w.pre_phase, epDays: w.ep_days ?? 5,
    episodes: (epsByWork[w.id] || []).sort((a,b) => a.ep - b.ep),
  }));
}

// ── 헬퍼 ────────────────────────────────────────────────────
function wColor(id) { return state.workers.find(w=>w.id===id)?.color ?? '#888'; }
function wName(id)  { return state.workers.find(w=>w.id===id)?.name  ?? '미정'; }
function isSup(id)  { return state.workers.find(w=>w.id===id)?.isSup ?? false; }
function isConfirmNeeded(ep) { return CONFIRM_STAGES.includes(ep.stage) && ep.progress === 100; }

// 전체 보기면 전체 / 그 외(감독 포함)는 본인 담당 작품만
// 감독은 컨펌 필요 항목을 별도 카드로 추가 노출
function getWorks() {
  const w = state.currentWorker;
  if (w === 'all') return state.works;
  return state.works.filter(x => x.worker === w);
}

function getFilteredWorks() {
  let works = getWorks();
  if (state.worksFilter !== 'all') works = works.filter(w => w.prePhase === state.worksFilter);
  return sortWorks(works);
}

// 연재 진행 중(prePhase=3) 우선, 같은 그룹 안에서는 제목 가나다순
function sortWorks(works) {
  return [...works].sort((a,b) => {
    const aOnAir = a.prePhase === 3, bOnAir = b.prePhase === 3;
    if (aOnAir !== bOnAir) return aOnAir ? -1 : 1;
    return a.title.localeCompare(b.title, 'ko');
  });
}

// 컨펌 필요 목록: 영상초안/피드백/마무리 단계에서 progress=100인 회차
function getConfirmItems() {
  return state.works.flatMap(w =>
    w.episodes
      .filter(ep => isConfirmNeeded(ep))
      .map(ep => ({
        ...ep,
        workId: w.id,
        workTitle: w.title,
        weekIdx: epWeekIdx(ep),
        confirmLabel: ep.stage === 3 ? '초안 확인' : ep.stage === 4 ? '피드백 확인' : '최종 확인',
      }))
  );
}

// 다음 회차 각색 필요: 어떤 회차가 미시작인데, 직전 회차가 피드백 수정중(또는 그 이후)인 경우 → 각색및총괄에게 알림
function getAdaptItems() {
  return state.works.flatMap(w =>
    w.episodes
      .filter(ep => {
        if (ep.stage !== 0) return false;
        if (ep.ep === 1)    return false;
        const prev = w.episodes.find(e => e.ep === ep.ep - 1);
        return prev && prev.stage >= STAGE_FEEDBACK;
      })
      .map(ep => ({
        ...ep,
        workId: w.id,
        workTitle: w.title,
        weekIdx: epWeekIdx(ep),
      }))
  );
}

// 일정 지연 (originalEndDate 대비 endDate가 늦어진 회차들)
function getDelayedItems() {
  const out = [];
  const today = fmtDate(new Date());
  state.works.forEach(w => {
    w.episodes.forEach(ep => {
      if (!ep.endDate) return;
      // 현재 기록된 작업 종료일이 지났는데 아직 '완료(stage 6)'가 아님
      if (ep.stage !== 6 && today > ep.endDate) {
        out.push({
          workId: w.id, workTitle: w.title, ep: ep.ep, stage: ep.stage,
          delay: businessDaysBetween(ep.endDate, today),
          endDate: ep.endDate,
        });
      }
    });
  });
  return out;
}

  }

// ── 작품별 현황 ──────────────────────────────────────────────
function renderWorksView() {
  const cw = state.currentWorker;
  const isSupView = isSup(cw);

  let html = '';

  // 감독 뷰: 컨펌 필요 카드 섹션을 상단에 표시
  if (isSupView) {
    const sup = state.workers.find(x => x.id === cw);
    const items = getConfirmItems();
    if (items.length > 0) {
      html += `<div class="cf-section">
        <div class="cf-section-title">🔔 컨펌 필요 <span class="cf-count">${items.length}</span></div>
        <div class="cf-cards">${items.map(confirmCardHTML).join('')}</div>
      </div>`;
    }
    // 각색및총괄에게만 '다음 회차 각색' 알림
    if (sup?.subrole === '각색및총괄') {
      const adapts = getAdaptItems();
      if (adapts.length > 0) {
        html += `<div class="cf-section">
          <div class="cf-section-title cf-adapt-title">✏️ 각색 필요 <span class="cf-count cf-count-adapt">${adapts.length}</span></div>
          <div class="cf-cards">${adapts.map(adaptCardHTML).join('')}</div>
        </div>`;
      }
    }
  }

  // 본인(또는 전체) 작품 카드
  const works = getFilteredWorks();
  const isAllView = cw === 'all';

  if (isAllView) {
    // 전체 보기: 담당자 있는 작품 / 담당자 미정 작품을 분리해서 표시
    const assigned   = works.filter(w => state.workers.some(x => x.id === w.worker));
    const unassigned = works.filter(w => !state.workers.some(x => x.id === w.worker));

    if (assigned.length > 0) {
      html += `<div class="works-grid">${assigned.map(workCardHTML).join('')}</div>`;
    }
    if (unassigned.length > 0) {
      html += `<div class="cf-section-title" style="color:var(--text);margin-top:18px">👤 담당자 미정 <span style="color:var(--text2);font-weight:500">· ${unassigned.length}</span></div>`;
      html += `<div class="works-grid">${unassigned.map(workCardHTML).join('')}</div>`;
    }
  } else if (works.length > 0) {
    if (isSupView) html += `<div class="cf-section-title" style="color:var(--text);margin-top:6px">담당 작품</div>`;
    html += `<div class="works-grid">${works.map(workCardHTML).join('')}</div>`;
  }

  document.getElementById('view-works').innerHTML = html;
}

// 컨펌 완료: 회차의 단계를 다음 단계로 진행시키고, 작업자 화면에 '컨펌 완료' 표식 부착
async function confirmDone(workId, epNum) {
  const ep = state.works.find(w => w.id === workId).episodes.find(e => e.ep === epNum);
  if (!ep) return;
  const prevStageLabel = STAGES[ep.stage];
  const r = await supabase.from('episodes').update({
    stage: Math.min(6, ep.stage + 1),
    progress: 0,
    ack_kind: 'confirm',
    ack_label: `${prevStageLabel} 컨펌 완료`,
  }).eq('work_id', workId).eq('ep_num', epNum);
  if (dbErr('컨펌 완료', r.error)) return;
  await loadAll();
  render();
}
// 각색 완료: 미시작 → 각색 완료 (stage 1)
async function adaptDone(workId, epNum) {
  const ep = state.works.find(w => w.id === workId).episodes.find(e => e.ep === epNum);
  if (!ep) return;
  const r = await supabase.from('episodes').update({
    stage: 1, progress: 0,
    ack_kind: 'adapt', ack_label: '각색 완료',
  }).eq('work_id', workId).eq('ep_num', epNum);
  if (dbErr('각색 완료', r.error)) return;
  await loadAll();
  render();
}

function workCardHTML(w) {
  const role = state.workers.find(x=>x.id===w.worker)?.subrole;
  const roleTxt = role ? ` · ${role}` : '';

  const phaseSteps = PRE_PHASES.slice(0,3).map((p,i) => {
    const cls  = (w.prePhase===3 || i < w.prePhase) ? 'done' : i===w.prePhase ? 'active' : 'pending';
    const icon = (w.prePhase===3 || i < w.prePhase) ? '✓' : i+1;
    return `<div class="phase-step"><div class="pdot ${cls}">${icon}</div><div class="plabel">${p}</div></div>`;
  }).join('');

  const epRows = w.episodes.map(ep => {
    const sc = STAGE_COLORS[ep.stage];
    const isThisWeek = isCurrentEp(ep);
    const progHTML = (PROG_STAGES.includes(ep.stage) || ep.progress>0)
      ? `<div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" style="width:${ep.progress}%;background:${sc}"></div></div><div class="prog-txt">${ep.progress}%</div></div>`
      : '<span style="color:var(--text2);font-size:11px">–</span>';
    const confirmBadge = isConfirmNeeded(ep)
      ? `<span class="estage confirm-needed" style="margin-left:4px">컨펌 필요</span>` : '';
    const ackBadge = ep.ack
      ? `<span class="estage ack-badge ack-${ep.ack.kind}" style="margin-left:4px">✓ ${ep.ack.label}</span>` : '';
    return `<tr class="${isThisWeek?'this-week':''}" onclick="openEditEpisode(${w.id},${ep.ep})" style="cursor:pointer">
      <td>${ep.ep}화${isThisWeek ? ' <span style="color:var(--accent);font-size:9px">이번 주</span>' : ''}</td>
      <td class="ep-sched" onclick="event.stopPropagation();openEditSchedule(${w.id},${ep.ep})" style="color:var(--text2);font-size:11px;cursor:pointer">${fmtRange(ep.startDate, ep.endDate)}</td>
      <td><span class="estage ${STAGE_CLS[ep.stage]}">${STAGES[ep.stage]}</span>${confirmBadge}${ackBadge}</td>
      <td>${progHTML}</td>
      <td style="color:var(--text2);font-size:11px">${ep.memo||''}</td>
    </tr>`;
  }).join('');

  const isPreDone = w.prePhase === 3;
  const bodyHTML = isPreDone
    ? `<table class="ep-table">
        <thead><tr><th>회차</th><th>일정</th><th>단계</th><th>진행률</th><th>메모</th></tr></thead>
        <tbody>${epRows}</tbody>
      </table>`
    : `<div class="pre-phases">${phaseSteps}</div>`;

  return `<div class="wk-card">
    <div class="wk-header">
      <div>
        <div class="wk-title">${w.title}</div>
        <div class="wk-meta"><span style="font-weight:600">${wName(w.worker)}</span>${roleTxt} &nbsp;·&nbsp; ${w.startMonth}월 시작 &nbsp;·&nbsp; ${w.totalEp}화 &nbsp;·&nbsp; ${w.epDays}영업일</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="phase-badge">${PRE_PHASES[w.prePhase]}</span>
        <button onclick="event.stopPropagation();openEditWork(${w.id})" style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:12px">✎</button>
      </div>
    </div>
    ${bodyHTML}
  </div>`;
}

// ── 주간 타임라인 (캘린더 위에 막대) ────────────────────────────
// ── 관리자용 보드 ────────────────────────────────────────────
function currentEpOf(w) {
  // 작업 중인 회차 찾기 (가장 진행이 많이 된 회차의 다음 진행 단계 회차)
  const inProg = w.episodes.find(e => e.stage > 0 && e.stage < 6);
  if (inProg) return inProg;
  const lastDone = [...w.episodes].reverse().find(e => e.stage === 6);
  if (lastDone && lastDone.ep < w.episodes.length) {
    return w.episodes.find(e => e.ep === lastDone.ep + 1);
  }
  return w.episodes[0];
}

function workRowHTML(w, opts={}) {
  const worker     = state.workers.find(x => x.id === w.worker);
  const workerName = worker ? worker.name : '미정';
  const cur        = currentEpOf(w);
  const cells = [`<div class="ab-tw-title" onclick="event.stopPropagation();">${w.title}</div>`];
  cells.push(`<div class="ab-tw-cell">${workerName}</div>`);
  if (opts.showCurrent) {
    cells.push(`<div class="ab-tw-cell">${cur ? `${cur.ep}화 · ${STAGES[cur.stage]}` : '–'}</div>`);
  }
  if (opts.showSched) {
    cells.push(`<div class="ab-tw-cell">${cur ? fmtRange(cur.startDate, cur.endDate) : '–'}</div>`);
  }
  if (opts.showProgress) {
    const total = w.episodes.length;
    const done  = w.episodes.filter(e => e.stage === 6).length;
    cells.push(`<div class="ab-tw-cell">${done}/${total}화 완료</div>`);
  }
  if (opts.showPhase) {
    cells.push(`<div class="ab-tw-cell"><span class="phase-badge">${PRE_PHASES[w.prePhase]}</span></div>`);
  }
  const deleteBtn = `<button class="ab-del-btn" onclick="event.stopPropagation();deleteWork(${w.id},'${w.title.replace(/'/g,"\\'")}')">🗑</button>`;
  return `<div class="ab-tw-row">${cells.join('')}${deleteBtn}</div>`;
}

function workTableHTML(works, headers, opts) {
  if (works.length === 0) return `<div class="ab-empty">해당 작품이 없습니다.</div>`;
  const narrowCls = headers.length <= 3 ? ' ab-tw-narrow' : '';
  const head = `<div class="ab-tw-row ab-tw-head">${headers.map(h=>`<div class="ab-tw-cell">${h}</div>`).join('')}<div class="ab-tw-cell"></div></div>`;
  const body = sortWorks(works).map(w => workRowHTML(w, opts)).join('');
  return `<div class="ab-tw${narrowCls}" style="--ab-cols:${headers.length + 1}">${head}${body}</div>`;
}

function workerWorkdayStatsHTML() {
  function epBizDays(s, e) { return businessDaysBetween(s, e) + 1; }

  const cards = state.workers.map(worker => {
    const worksForWorker = state.works.filter(w => w.worker === worker.id);
    const groups = worksForWorker
      .map(work => {
        const doneEps = work.episodes
          .filter(ep => ep.stage === 6)
          .map(ep => ({
            ep: ep.ep,
            actual:  epBizDays(ep.startDate,         ep.endDate),
            planned: epBizDays(ep.originalStartDate, ep.originalEndDate),
          }));
        return { title: work.title, eps: doneEps };
      })
      .filter(g => g.eps.length > 0);

    if (groups.length === 0) return null;

    const allActual = groups.flatMap(g => g.eps.map(e => e.actual));
    const avg = (allActual.reduce((s, v) => s + v, 0) / allActual.length).toFixed(1);

    const groupsHTML = groups.map(g => {
      const epsHTML = g.eps.map(e => {
        const diff = e.actual - e.planned;
        const cls  = diff < 0 ? 'ws-faster' : diff > 0 ? 'ws-slower' : 'ws-same';
        const badge = diff < 0 ? `▲${-diff}일 단축` : diff > 0 ? `▼${diff}일 초과` : '기준';
        return `<div class="ws-ep-row ${cls}">
          <span class="ws-ep-num">${e.ep}화</span>
          <span class="ws-ep-actual">${e.actual}일</span>
          <span class="ws-ep-planned">기준 ${e.planned}일</span>
          <span class="ws-ep-badge">${badge}</span>
        </div>`;
      }).join('');
      return `<div class="ws-work-group">
        <div class="ws-work-title">${g.title}</div>
        ${epsHTML}
      </div>`;
    }).join('');

    return `<div class="ws-card">
      <div class="ws-header">
        <div>
          <span class="ws-name" style="color:${worker.color}">${worker.name}</span>
          ${worker.subrole ? `<span class="ws-subrole">${worker.subrole}</span>` : ''}
        </div>
        <div><span class="ws-avg-lbl">평균</span><span class="ws-avg-val">${avg}일</span></div>
      </div>
      ${groupsHTML}
    </div>`;
  }).filter(Boolean);

  if (cards.length === 0) return `<div class="ab-empty">완료된 회차가 없습니다.</div>`;
  return `<div class="ws-grid">${cards.join('')}</div>`;
}

function renderTimelineView() {
  const cw = state.currentWorker;
  const works = (cw === 'all') ? state.works : state.works.filter(x => x.worker === cw);

  const confirmItems = getConfirmItems();
  const showConfirm  = cw === 'all' || isSup(cw);
  const sups         = state.workers.filter(w => w.isSup);

  const COL_W      = 26;
  const ROW_H      = 52;
  const LANE_H     = 24;
  const totalCols  = TOTAL_WEEKS * 5;
  const trackW     = totalCols * COL_W;
  const DAYS       = ['월','화','수','목','금'];

  // 오늘 기준
  const today      = new Date();
  const daysSince  = Math.floor((today - WEEK_ORIGIN) / 86400000);
  const curWeekI   = Math.max(0, Math.min(TOTAL_WEEKS - 1, Math.floor(daysSince / 7)));
  const dow        = today.getDay();
  const inWeekday  = dow >= 1 && dow <= 5;
  const curDayI    = inWeekday ? dow - 1 : -1;
  const todayCol   = (inWeekday && daysSince >= 0 && curWeekI < TOTAL_WEEKS) ? curWeekI * 5 + curDayI : -1;
  const todayLineHTML = todayCol >= 0
    ? `<div class="tl-today" style="left:${todayCol*COL_W + COL_W/2}px"></div>` : '';

  // 헤더: 주 + 요일
  let weekHd = '';
  for (let w = 0; w < TOTAL_WEEKS; w++) {
    const cur = w === curWeekI;
    weekHd += `<div class="tl-week-hd${cur?' cur':''}" style="left:${w*5*COL_W}px;width:${5*COL_W}px;">${weekLabel(w)}${cur?' ★':''}</div>`;
  }
  let dayHd = '';
  for (let w = 0; w < TOTAL_WEEKS; w++) {
    for (let d = 0; d < 5; d++) {
      const isCurDay = w === curWeekI && d === curDayI;
      dayHd += `<div class="tl-day-hd${isCurDay?' cur-day':''}" style="left:${(w*5+d)*COL_W}px;width:${COL_W}px;">${DAYS[d]}</div>`;
    }
  }

  // 행 배경 그리드 (주 경계선 + 오늘 컬럼 하이라이트)
  let bgGrid = '';
  for (let w = 0; w < TOTAL_WEEKS; w++) {
    for (let d = 0; d < 5; d++) {
      const col = w*5+d;
      const cls = (d === 0 ? ' week-start' : '') + (col === todayCol ? ' cur-day' : '');
      bgGrid += `<div class="tl-bg-cell${cls}" style="left:${col*COL_W}px;width:${COL_W}px;"></div>`;
    }
  }

  let html = `<div class="tl-wrap" style="width:${160 + trackW}px">`;

  // 헤더 row
  html += `<div class="tl-row tl-row-head">
    <div class="tl-side"><div class="tl-row-label">작품 / 작업자</div></div>
    <div class="tl-track tl-track-head" style="width:${trackW}px">${weekHd}${dayHd}</div>
  </div>`;

  // ── 컨펌 필요 섹션 ──
  if (showConfirm && sups.length > 0) {
    html += `<div class="tl-section-row">
      <div class="tl-section-label">컨펌 필요${confirmItems.length>0?` · ${confirmItems.length}`:''}</div>
      <div class="tl-section-fill" style="width:${trackW}px"></div>
    </div>`;

    const adaptItems = getAdaptItems();

    sups.forEach(sup => {
      const isAdaptSup = sup.subrole === '각색및총괄';
      const supItems = [
        ...confirmItems.map(c => ({ ...c, _kind: 'confirm' })),
        ...(isAdaptSup ? adaptItems.map(c => ({ ...c, _kind: 'adapt' })) : []),
      ];
      const { items: laidItems, laneCount } = assignLanes(supItems);
      const supRowH = Math.max(ROW_H, 8 + laneCount * (LANE_H + 4));

      html += `<div class="tl-row" style="min-height:${supRowH}px">
        <div class="tl-side">
          <div class="tl-row-label">${sup.name}</div>
          <div class="tl-row-sub">${sup.subrole}</div>
        </div>
        <div class="tl-track" style="width:${trackW}px;height:${supRowH}px">
          ${bgGrid}${todayLineHTML}`;
      laidItems.forEach(c => {
        const sCol = dateToCol(c.startDate);
        const eCol = dateToCol(c.endDate);
        const left = sCol * COL_W + 2;
        const width = (eCol - sCol + 1) * COL_W - 4;
        const top = 4 + (c._lane ?? 0) * (LANE_H + 4);
        const isAdapt = c._kind === 'adapt';
        const cls = isAdapt ? 'tl-adapt-bar' : 'tl-confirm-bar';
        const icon = isAdapt ? '✏️' : '🔔';
        const tip = isAdapt ? `${c.workTitle} ${c.ep}화 각색 필요` : `${c.workTitle} ${c.ep}화 · ${c.confirmLabel}`;
        html += `<div class="${cls}"
          style="left:${left}px;width:${width}px;top:${top}px;height:${LANE_H}px;"
          onclick="openEditEpisode(${c.workId},${c.ep})"
          title="${tip}">${icon} ${c.workTitle} ${c.ep}화</div>`;
      });
      html += `</div></div>`;
    });
  }

  // ── 작업 현황 섹션 ──
  html += `<div class="tl-section-row">
    <div class="tl-section-label">작업 현황</div>
    <div class="tl-section-fill" style="width:${trackW}px"></div>
  </div>`;

  // 작업자 그룹 + 미정(담당자 없음) 그룹
  const groups = [
    ...state.workers.map(worker => ({ label: worker.name, list: works.filter(w => w.worker === worker.id) })),
    { label: '미정', list: works.filter(w => !state.workers.some(wk => wk.id === w.worker)) },
  ];
  groups.forEach(group => {
    const workerWorks = sortWorks(group.list);
    if (!workerWorks.length) return;

    workerWorks.forEach(w => {
      html += `<div class="tl-row" style="min-height:${ROW_H}px">
        <div class="tl-side">
          <div class="tl-row-label">${w.title}</div>
          <div class="tl-row-sub">${group.label}</div>
        </div>
        <div class="tl-track" style="width:${trackW}px;height:${ROW_H}px">
          ${bgGrid}${todayLineHTML}`;

      w.episodes.forEach(ep => {
        if (!ep.startDate || !ep.endDate) return;
        const sCol = dateToCol(ep.startDate);
        const eCol = dateToCol(ep.endDate);
        const left = sCol * COL_W + 2;
        const width = Math.max(COL_W - 4, (eCol - sCol + 1) * COL_W - 4);
        const sc   = STAGE_COLORS[ep.stage];
        const isConfirm = isConfirmNeeded(ep);
        const pctTxt = ep.progress > 0 ? ` ${ep.progress}%` : '';
        html += `<div class="tl-bar${isConfirm?' is-confirm':''}"
          style="left:${left}px;width:${width}px;top:6px;bottom:6px;background:${sc}cc;"
          onclick="openEditEpisode(${w.id},${ep.ep})"
          title="${ep.ep}화 · ${STAGES[ep.stage]}${pctTxt} · ${fmtRange(ep.startDate, ep.endDate)}">
          <div class="tl-bar-ep">${ep.ep}화${isConfirm?' 🔔':''}</div>
          <div class="tl-bar-stage">${STAGES[ep.stage]}${pctTxt}</div>
          ${ep.progress > 0 ? `<div class="tl-bar-prog" style="width:${ep.progress}%"></div>` : ''}
        </div>`;
      });
      html += `</div></div>`;
    });
  });

  html += `</div>`;
  document.getElementById('timeline-container').innerHTML = html;

  // 이번 주로 자동 스크롤
  const scroll = document.getElementById('tl-scroll');
  scroll.scrollLeft = Math.max(0, curWeekI * 5 * COL_W - 60);
}

async function saveWork() {
  const btn = document.getElementById('btn-save-work');
  if (btn.disabled) return;
  btn.disabled = true;
  try {
    const title      = document.getElementById('inp-title').value.trim();
    if (!title) { alert('작품명을 입력하세요'); return; }
    const worker     = document.getElementById('inp-worker').value || null;
    const startMonth = parseInt(document.getElementById('inp-startMonth').value);
    const totalEp    = parseInt(document.getElementById('inp-totalEp').value);
    const epDays     = parseInt(document.getElementById('inp-epDays').value) || 5;
    const prePhase   = parseInt(document.getElementById('inp-prePhase').value);

    if (state.editingWorkId) {
      const w = state.works.find(x => x.id === state.editingWorkId);
      const scheduleChanged = w.totalEp !== totalEp || w.startMonth !== startMonth;
      const daysChanged     = w.epDays !== epDays;

      // 총 회차 수 · 시작 월 변경 → 전체 회차 삭제 후 재생성
      if (scheduleChanged) {
        const r = await supabase.from('episodes').delete().eq('work_id', w.id);
        if (dbErr('회차 초기화', r.error)) return;
      }

      const upd = await supabase.from('works').update({
        title, worker, start_month: startMonth, total_ep: totalEp, ep_days: epDays, pre_phase: prePhase,
      }).eq('id', w.id);
      if (dbErr('작품 수정', upd.error)) return;

      if (scheduleChanged) {
        // generate_episodes_for_work가 w.ep_days를 읽으므로 새 epDays도 함께 반영됨
        const rpc = await supabase.rpc('generate_episodes_for_work', { p_work_id: w.id });
        if (dbErr('회차 생성', rpc.error)) return;
      } else if (daysChanged) {
        // ep_days만 변경 → 미시작(stage===0) 회차의 날짜만 순서대로 재계산
        const allEps = [...w.episodes].sort((a, b) => a.ep - b.ep);
        let cursor = null;
        for (const ep of allEps) {
          if (ep.stage > 0) {
            // 시작된 회차는 건드리지 않고, 그 종료일 다음 영업일로 커서 이동
            cursor = addBusinessDays(ep.endDate, 1);
            continue;
          }
          const newStart = cursor ?? ep.startDate;
          const newEnd   = addBusinessDays(newStart, epDays - 1);
          const r = await supabase.from('episodes').update({
            start_date: newStart, end_date: newEnd,
            original_start_date: newStart, original_end_date: newEnd,
          }).eq('work_id', w.id).eq('ep_num', ep.ep);
          if (dbErr('회차 작업일 변경', r.error)) return;
          cursor = addBusinessDays(newEnd, 1);
        }
      }
    } else {
      // 새 작품 — 트리거가 자동으로 회차 생성
      const ins = await supabase.from('works').insert({
        title, worker, start_month: startMonth, total_ep: totalEp, ep_days: epDays, pre_phase: prePhase,
      });
      if (dbErr('작품 추가', ins.error)) return;
    }
    closeModal('modal-work');
    await loadAll();
    render();
  } finally {
    btn.disabled = false;
  }
}

// ── 작품 삭제 (관리자 전용) ──────────────────────────────────────

// ── 회차 수정 ─────────────────────────────────────────────────

  document.getElementById('prog-slider').value = ep.progress;

  document.getElementById('ep-memo').value = ep.memo || '';

}

function selStage(i) {
  document.querySelectorAll('.stbtn').forEach((b,idx)=>b.classList.toggle('sel',idx===i));
  document.getElementById('prog-group').style.display = PROG_STAGES.includes(i) ? 'block' : 'none';
}

function getSelStage() {
  const btns = document.querySelectorAll('.stbtn');
  for (let i=0;i<btns.length;i++) if (btns[i].classList.contains('sel')) return i;
  return 0;
}

// ── 일정 선택 (캘린더 시작일~종료일) ──────────────────────────
let schedDraft = { workId:null, epNum:null, startDate:null, endDate:null };
let calView    = { year: 2026, month: 5 };

function openEditSchedule(workId, epNum) {
  const w  = state.works.find(x => x.id === workId);
  const ep = w.episodes.find(e => e.ep === epNum);
  schedDraft = { workId, epNum, startDate: ep.startDate, endDate: ep.endDate };
  const sd = parseDate(ep.startDate);
  calView = { year: sd.getFullYear(), month: sd.getMonth()+1 };
  document.getElementById('modal-sched-title').textContent = `${w.title} — ${epNum}화 일정`;
  renderCalendar();
  document.getElementById('modal-sched').classList.add('open');
}

function changeCalMonth(delta) {
  let m = calView.month + delta, y = calView.year;
  if (m < 1)  { m = 12; y--; }
  if (m > 12) { m = 1;  y++; }
  calView = { year: y, month: m };
  renderCalendar();
}

function renderCalendar() {
  const { year, month } = calView;
  document.getElementById('cal-mlbl').textContent = `${year}년 ${month}월`;

  // 첫 번째 월요일 (이 달의 1일이 속한 주의 월요일)
  const first = new Date(year, month-1, 1);
  const dow   = first.getDay();           // 0=일 … 6=토
  const offset = (dow + 6) % 7;           // 월=0, 화=1, … 일=6
  const calStart = new Date(first);
  calStart.setDate(first.getDate() - offset);

  // 마지막 날
  const last = new Date(year, month, 0);

  // 주 단위로 월~금만 셀 생성
  const cells = [];
  let d = new Date(calStart);
  while (true) {
    const weekRow = [];
    for (let i = 0; i < 5; i++) {
      weekRow.push(new Date(d));
      d.setDate(d.getDate() + 1);
    }
    cells.push(...weekRow);
    d.setDate(d.getDate() + 2); // 토,일 스킵
    // 이번 주의 월요일이 이 달의 마지막 날을 넘었으면 종료
    if (weekRow[0] > last) break;
  }

  const todayStr = fmtDate(new Date());
  const html = cells.map(c => {
    const ds = fmtDate(c);
    const inMonth = (c.getMonth()+1) === month;
    const isStart = ds === schedDraft.startDate;
    const isEnd   = ds === schedDraft.endDate;
    const inRange = schedDraft.startDate && schedDraft.endDate &&
                    ds > schedDraft.startDate && ds < schedDraft.endDate;
    let cls = 'cal-day';
    if (!inMonth)          cls += ' cal-day-out';
    if (ds === todayStr)   cls += ' cal-day-today';
    if (isStart)           cls += ' cal-day-start';
    if (isEnd && !isStart) cls += ' cal-day-end';
    if (inRange)           cls += ' cal-day-range';
    return `<div class="${cls}" onclick="pickCalDay('${ds}')">${c.getDate()}</div>`;
  }).join('');
  document.getElementById('cal-grid').innerHTML = html;

  const sel = (schedDraft.startDate && schedDraft.endDate)
    ? `선택된 기간: <b style="color:var(--accent)">${fmtRange(schedDraft.startDate, schedDraft.endDate)}</b>`
    : schedDraft.startDate
    ? `시작일: <b style="color:var(--accent)">${fmtRange(schedDraft.startDate, null)}</b> · 종료일을 선택하세요`
    : '시작일을 선택하세요';
  document.getElementById('cal-selection').innerHTML = sel;
}

function pickCalDay(ds) {
  if (!schedDraft.startDate || (schedDraft.startDate && schedDraft.endDate)) {
    schedDraft.startDate = ds;
    schedDraft.endDate   = null;
  } else if (ds < schedDraft.startDate) {
    schedDraft.endDate   = schedDraft.startDate;
    schedDraft.startDate = ds;
  } else {
    schedDraft.endDate   = ds;
  }
  renderCalendar();
}

async function saveSchedule() {
  const btn = document.getElementById('btn-save-sched');
  if (btn.disabled) return;
  btn.disabled = true;
  try {
    const {workId, epNum, startDate, endDate} = schedDraft;
    if (!startDate || !endDate) { alert('시작일과 종료일을 모두 선택하세요'); return; }
    const work = state.works.find(x=>x.id===workId);
    const ep   = work.episodes.find(e=>e.ep===epNum);

    // 변경 전 종료일과 비교해서 영업일 차이만큼 뒤 회차들도 일괄 시프트
    const oldEnd = ep.endDate;
    const delta  = businessDaysBetween(oldEnd, endDate);

    // 본 회차 업데이트
    const r1 = await supabase.from('episodes')
      .update({ start_date: startDate, end_date: endDate })
      .eq('work_id', workId).eq('ep_num', epNum);
    if (dbErr('일정 저장', r1.error)) return;

    // 뒤 회차 일괄 시프트
    if (delta !== 0) {
      const updates = work.episodes
        .filter(e => e.ep > epNum)
        .map(e => ({
          ep_num: e.ep,
          start_date: addBusinessDays(e.startDate, delta),
          end_date:   addBusinessDays(e.endDate,   delta),
        }));
      for (const u of updates) {
        const r = await supabase.from('episodes')
          .update({ start_date: u.start_date, end_date: u.end_date })
          .eq('work_id', workId).eq('ep_num', u.ep_num);
        if (dbErr('일정 시프트', r.error)) return;
      }
    }

    closeModal('modal-sched');
    await loadAll();
    render();
  } finally {
    btn.disabled = false;
  }
}

async function saveEpisode() {
  const btn = document.getElementById('btn-save-ep');
  if (btn.disabled) return;
  btn.disabled = true;
  try {
    const {workId, epNum} = state.editingEpKey;
    const ep = state.works.find(x=>x.id===workId).episodes.find(e=>e.ep===epNum);
    const newStage = getSelStage();
    const newProg  = PROG_STAGES.includes(newStage) ? parseInt(document.getElementById('prog-slider').value) : 0;
    const newMemo  = document.getElementById('ep-memo').value.trim();
    // 작업자가 단계를 바꾸면 컨펌/각색 완료 표식 해제
    const ackPatch = newStage !== ep.stage ? { ack_kind: null, ack_label: null } : {};

    const r = await supabase.from('episodes').update({
      stage: newStage, progress: newProg, memo: newMemo, ...ackPatch,
    }).eq('work_id', workId).eq('ep_num', epNum);
    if (dbErr('회차 저장', r.error)) return;

    closeModal('modal-ep');
    await loadAll();
    render();
  } finally {
    btn.disabled = false;
  }
}

// ── 작업자 추가 ───────────────────────────────────────────────
let selectedWorkerColor = '#6c63ff';

function openAddWorker() {
  document.getElementById('inp-wname').value = '';
  document.getElementById('inp-wrole').value = 'worker';
  document.getElementById('inp-wsubrole').value = '';
  selectedWorkerColor = '#6c63ff';
  document.querySelectorAll('.color-opt').forEach(el => {
    el.style.border = el.dataset.color === selectedWorkerColor ? '2px solid #fff' : '2px solid transparent';
  });
  document.getElementById('inp-wcolor').value = selectedWorkerColor;
  document.getElementById('modal-worker').classList.add('open');
}

async function saveWorker() {
  const btn = document.getElementById('btn-save-worker');
  if (btn.disabled) return;
  btn.disabled = true;
  try {
    const name = document.getElementById('inp-wname').value.trim();
    if (!name) { alert('이름을 입력하세요'); return; }
    const role    = document.getElementById('inp-wrole').value;
    const subrole = document.getElementById('inp-wsubrole').value.trim();
    const color   = document.getElementById('inp-wcolor').value;
    const id      = 'W' + Date.now();
    const isSup   = role === 'supervisor';

    // sort_order: 동일 그룹의 최대값 + 1 (그룹 끝에 추가)
    const sameGroup = state.workers.filter(w => w.isSup === isSup);
    const sortOrder = sameGroup.reduce((m,w) => Math.max(m, w.sortOrder ?? 0), isSup ? 0 : 99) + 1;

    const r = await supabase.from('workers').insert({
      id, name, color, is_sup: isSup, subrole, sort_order: sortOrder,
    });
    if (dbErr('작업자 추가', r.error)) return;

    closeModal('modal-worker');
    await loadAll();
    render();
  } finally {
    btn.disabled = false;
  }
}

// color picker
document.getElementById('color-picker').addEventListener('click', e => {
  const opt = e.target.closest('.color-opt');
  if (!opt) return;
  selectedWorkerColor = opt.dataset.color;
  document.getElementById('inp-wcolor').value = selectedWorkerColor;
  document.querySelectorAll('.color-opt').forEach(el => {
    el.style.border = el.dataset.color === selectedWorkerColor ? '2px solid #fff' : '2px solid transparent';
  });
});
document.getElementById('inp-wcolor').addEventListener('input', e => {
  selectedWorkerColor = e.target.value;
});

// ── 공통 ─────────────────────────────────────────────────────
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-overlay').forEach(overlay =>
  overlay.addEventListener('click', e => { if (e.target===overlay) overlay.classList.remove('open'); })
);

      <p style="color:#ff9fb5"><b>${(e && e.message) || e}</b></p>
      <p>가능한 원인:</p>

        <li>SUPABASE_URL / ANON_KEY가 잘못 입력됨</li>
        <li>Supabase 프로젝트의 RLS 정책이 anon 키 접근을 막고 있음</li>
        <li>SQL 셋업이 완료되지 않음 (workers/works/episodes 테이블 없음)</li>

      <p>브라우저 콘솔(F12)에서 자세한 에러 메시지를 확인하세요.</p>`);

})();
